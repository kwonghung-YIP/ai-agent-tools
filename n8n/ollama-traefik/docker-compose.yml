services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    command:
      - "--entrypoints.web.address=:80"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - 80:80
      - 443:443
      - 8080:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  
  #whoami:
  #  image: traefik/whoami
  #  container_name: whoami
  #  labels:
  #    - "traefik.enable=true"
  #    - "traefik.http.routers.whoami.rule=Host(`whoami.docker.localhost`)"
  #    - "traefik.http.routers.whomai.entrypoints=web"

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.10.4
    container_name: n8n
    environment:
      - N8N_HOST="n8n.hung.org"
      - N8N_PORT=80
      - N8N_PROTOCOL=http
      - N8N_LISTEN_ADDRESS="0.0.0.0"
      - GENERIC_TIMEZONE="Europe/London"
      - TZ="Europe/London"
    volumes:
      - n8n_data:/home/node/.n8n
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`n8n.hung.org`)"
      - "traefik.http.routers.whomai.entrypoints=web"

volumes:
  ollama_data:
    name: "ollama-data"
  n8n_data:
    name: "n8n-data"